<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StandardX — Proponente</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090F;--bg2:#0F1520;--bg3:#141E2E;--bord:#1B2840;--bord2:#243352;
  --az:#3B7BF6;--az2:#5B97FF;--az-bg:#070f1e;
  --vd:#0FB981;--vd2:#16D98A;--vd-bg:#031a0e;--vd-bord:#084D26;
  --am:#F5A623;--am2:#FFBA45;--am-bg:#1a0f00;--am-bord:#4A2D00;
  --vm:#EF4444;--vm2:#FF6B6B;--vm-bg:#180404;--vm-bord:#5C1414;
  --px:#7C3AED;--px2:#A78BFA;--px-bg:#130a2a;--px-bord:#4C1D95;
  --tx:#EEF2FF;--tx2:#94A3B8;--tx3:#475569;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px}
body{min-height:100vh;display:flex;justify-content:center}
.shell{width:100%;max-width:1280px;padding:24px 20px;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding-bottom:18px;border-bottom:1px solid var(--bord);margin-bottom:24px}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo em{color:var(--px);font-style:normal}
.tag{font-size:11px;color:var(--px2);background:var(--px-bg);border:1px solid var(--px-bord);border-radius:20px;padding:3px 10px}
.steps{display:flex;gap:6px;margin-left:auto}
.stp{width:8px;height:8px;border-radius:50%;background:var(--bord2);transition:all .3s}
.stp.cur{background:var(--px);width:24px;border-radius:4px}
.stp.done{background:var(--vd);cursor:pointer}
.scr{flex:1}
.titulo{font-family:'Syne',sans-serif;font-size:23px;font-weight:700;margin-bottom:5px}
.sub{color:var(--tx2);font-size:13px;margin-bottom:22px;line-height:1.6}
.fnav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:16px;border-top:1px solid var(--bord)}
.btn{background:var(--px);color:#fff;border:none;border-radius:8px;padding:11px 24px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s}
.btn:hover{background:var(--px2);color:#1a0a2e}
.btn-g{background:var(--vd);color:var(--bg)}.btn-g:hover{background:var(--vd2)}
.btn-s{background:transparent;color:var(--tx2);border:1px solid var(--bord);border-radius:8px;padding:10px 20px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-s:hover{border-color:var(--px);color:var(--px)}
.card{background:var(--bg2);border:1px solid var(--bord);border-radius:var(--r);padding:18px;margin-bottom:14px}
.sec-l{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.inp{background:var(--bg);border:1px solid var(--bord);border-radius:8px;padding:11px 14px;color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;width:100%;outline:none;margin-bottom:12px}
.inp:focus{border-color:var(--px)}.inp::placeholder{color:var(--tx3)}
/* Tabela */
.tbl-wrap{border-radius:var(--r);overflow:visible}
.tbl-wrap::-webkit-scrollbar{width:5px;height:5px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px}
table{border-collapse:collapse;width:100%;table-layout:fixed;border-spacing:0}
table th{background:var(--bg2);padding:8px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);border-bottom:1px solid var(--bord2);white-space:nowrap}
.thead-fixed{background:var(--bg2);border:1px solid var(--bord);border-radius:var(--r) var(--r) 0 0;overflow:hidden}
.thead-fixed table{table-layout:fixed;width:100%;border-collapse:collapse}
.tbody-scroll{overflow-y:scroll;overflow-x:auto;max-height:55vh;border:1px solid var(--bord);border-top:none;border-radius:0 0 var(--r) var(--r)}
.tbody-scroll table{table-layout:fixed;width:100%;border-collapse:collapse}
.tbody-scroll::-webkit-scrollbar{width:5px;height:5px}
.tbody-scroll::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px}
.tr-disc td{background:var(--bg3);padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);border-top:2px solid var(--bord2)}
.tr-e{border-bottom:1px solid var(--bord)}
.sumario{background:var(--bg2);border-top:1px solid var(--bord2);padding:12px 16px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;border-radius:0 0 var(--r) var(--r)}
.sum-n{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;line-height:1}
.sum-l{font-size:10px;color:var(--tx3);margin-top:2px}
.search{background:var(--bg2);border:1px solid var(--bord);border-radius:8px;padding:9px 14px;color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;width:100%;margin-bottom:10px;outline:none}
.search:focus{border-color:var(--px)}.search::placeholder{color:var(--tx3)}
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filtro{background:var(--bg2);border:1px solid var(--bord);border-radius:20px;padding:4px 14px;font-size:11px;color:var(--tx3);cursor:pointer;white-space:nowrap}
.filtro:hover,.filtro.on{background:var(--px-bg);border-color:var(--px-bord);color:var(--px2)}
.h-inp{background:var(--bg);border:1px solid var(--bord);border-radius:6px;padding:5px 6px;color:var(--tx);font-size:12px;font-family:'DM Sans',sans-serif;width:54px;text-align:center}
.h-inp:focus{outline:none;border-color:var(--px)}
.d-sel{background:var(--bg);border:1px solid var(--bord);border-radius:6px;padding:5px 6px;color:var(--tx);font-size:11px;font-family:'DM Sans',sans-serif}
.d-sel:focus{outline:none;border-color:var(--px)}
.gest-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bord)}
.gest-row:last-child{border-bottom:none}
.gest-inp{background:var(--bg);border:1px solid var(--bord);border-radius:6px;padding:6px 8px;color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;width:70px;text-align:center}
.gest-inp:focus{outline:none;border-color:var(--px)}
.rcard{background:var(--bg3);border:1px solid var(--bord);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.rcard.on{border-color:var(--bord2);background:var(--bg2)}
.rcard-top{display:flex;align-items:center;gap:10px}
.tog{width:40px;height:22px;border-radius:11px;background:var(--bord2);position:relative;transition:all .2s;cursor:pointer;flex-shrink:0}
.tog::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:all .2s}
.tog.on{background:var(--vd)}.tog.on::after{left:21px}
.pbar{height:4px;background:var(--bord);border-radius:2px;overflow:hidden;width:80px}
.pbar-f{height:100%;border-radius:2px}
.prop-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bord)}
.prop-row:last-child{border-bottom:none}
.drw-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;justify-content:flex-end}
.drw{background:var(--bg2);border-left:1px solid var(--bord);width:420px;max-width:100vw;height:100%;overflow-y:auto;padding:24px}
.drw::-webkit-scrollbar{width:4px}
.drw::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:2px}
.drw-close{width:30px;height:30px;background:var(--bg3);border:1px solid var(--bord);border-radius:6px;color:var(--tx2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.inf-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bord)}
.inf-item:last-child{border-bottom:none}
.inf-check{width:16px;height:16px;accent-color:var(--vd);cursor:pointer;flex-shrink:0;margin-top:2px}
.scope-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.scope-card{background:var(--bg3);border:1px solid var(--bord);border-radius:8px;padding:14px}
.scope-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.scope-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{background:var(--bg2);border:1px solid var(--bord);border-radius:16px;padding:40px;width:100%;max-width:420px;text-align:center}
.fade{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="logo">Standard<em>X</em></div>

  </div>
  <div class="scr fade" id="scr"></div>
</div>
<div class="drw-ov" id="drw-ov" style="display:none" onclick="closeDrw()">

</div>

    var stored=localStorage.getItem("stdx_escopo");
    if(stored){ var parsed=JSON.parse(stored); if(parsed&&parsed.obj) return parsed; }
  }catch(e){}
  try{
    var b64=new URLSearchParams(window.location.search).get("escopo");
    if(!b64) return null;
    return JSON.parse(decodeURIComponent(escape(atob(b64))));
  }catch(e){return null;}
}

function getSt(cod,nv){
  if(!ESCOPO.obj) return "NA";
  var r=ST[cod];
  return(r&&r[ESCOPO.obj.id]&&r[ESCOPO.obj.id][nv])||"NA";
}
function getPredList(){
  var list=[];
  var sugNv=NV_OBJ[ESCOPO.obj.id];
  var sugIdx=NVS.indexOf(sugNv);
  for(var cod in ESCOPO.sel){
    var predConts=[];
    for(var ni=0;ni<sugIdx;ni++){
      if(getSt(cod,NVS[ni])==="PRED"){
        var ct=(CONT[cod]&&CONT[cod][NVS[ni]])||"";
        if(ct&&ct!=="—") predConts.push({nv:NVS[ni],ct:ct});
      }
    }
    if(predConts.length){
      var e=null;
      for(var i=0;i<E.length;i++){if(E[i].c===cod){e=E[i];break;}}
      if(e) list.push({e:e,conts:predConts});
    }
  }
  return list;
}
function hTec(){
  var t=0;
  for(var cod in P.hCat) for(var c in P.hCat[cod]) t+=P.hCat[cod][c];
  return t;
}
function hGest(){ return Math.round(hTec()*P.gest.pct/100)+(P.gest.hExtra||0); }
function hReunOwner(){
  var t=0;
  for(var i=0;i<ESCOPO.reunioes.length;i++){
    var r=ESCOPO.reunioes[i];
    t+=(P.reunPart[r.id]||1)*(P.reunH[r.id]||0);
  }
  return t;
}
function hReunInt(){
  var t=0;
  for(var id in P.reunInt){
    var ri=P.reunInt[id];
    if(ri.inc) t+=ri.qtd*(ri.part||1)*ri.h;
  }
  return t;
}
function hVisitas(){
  if(!ESCOPO.vis||!ESCOPO.vis.on) return 0;
  if(ESCOPO.vis.modo==="opcional"&&!P.visRealiza) return 0;
  return P.visHoras||0;
}
function hTotal(){ return hTec()+hGest()+hAtivTotal(); }

function buildCatBarsHTML(){
  var allCats=CATS_TEC.concat(CATS_GEST);
  var maxH=0;
  for(var ca=0;ca<allCats.length;ca++){
    var cv=0; for(var cod in P.hCat){if(P.hCat[cod]&&P.hCat[cod][allCats[ca]])cv+=P.hCat[cod][allCats[ca]];}
    if(cv>maxH)maxH=cv;
  }
  var gestH=hGest(); var gestPerCat=CATS_GEST.length>0?Math.round(gestH/CATS_GEST.length):0;
  if(gestPerCat>maxH) maxH=gestPerCat;
  var html='<div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Distribuição de horas por categoria</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px">';
  for(var ca2=0;ca2<allCats.length;ca2++){
    var cat4=allCats[ca2]; var isTec=CATS_TEC.indexOf(cat4)>=0;
    var catV=0;
    for(var cod2 in P.hCat){if(P.hCat[cod2]&&P.hCat[cod2][cat4])catV+=P.hCat[cod2][cat4];}
    for(var aid2 in P.hAtiv){if(P.hAtiv[aid2]&&P.hAtiv[aid2][cat4])catV+=P.hAtiv[aid2][cat4];}
    if(!isTec) catV+=gestPerCat;
    var barH=maxH>0?Math.max(4,Math.round(catV/maxH*60)):0;
    var barC=isTec?'var(--az2)':'var(--px2)';
    html+='<div style="text-align:center">';
    html+='<div style="font-size:10px;font-weight:700;color:'+(isTec?'var(--az2)':'var(--px2)')+';margin-bottom:4px">'+cat4+'</div>';
    html+='<div style="display:flex;align-items:flex-end;justify-content:center;height:64px">';
    html+='<div style="width:28px;background:'+barC+';border-radius:3px 3px 0 0;height:'+barH+'px;min-height:'+(catV>0?'4px':'0')+'">'+'</div></div>';
    html+='<div style="font-size:11px;font-weight:700;color:var(--tx)">'+(catV>0?catV+'h':'—')+'</div></div>';
  }
  html+='</div>';
  return html;
}

function T2(){

}


function gerarProposta(){
  var doc=gerarHTMLProposta();
  var w=window.open("","_blank");
  if(!w){alert("Permita popups para gerar a proposta.");return;}
  w.document.write(doc);

}

var Ts=[T0,T1,T2,T4,T3b,T3,T6,T5];

function tSoftProp(id){if(!P.softPropList)P.softPropList=[];var i=P.softPropList.indexOf(id);if(i>=0)P.softPropList.splice(i,1);else P.softPropList.push(id);render();}
function setFornPac(el){if(!P.fornPac)P.fornPac={};P.fornPac[el.dataset.fk]=+el.value;render();}
function setFornH(el){if(!P.fornH)P.fornH={};P.fornH[el.dataset.fk]=+el.value;render();}
function calcRI(f){
  var dur=ESCOPO.dur||16;
  var w=FW[f]||0;
  if(!w) return 1; // Por evento = 1
  return Math.max(1,Math.round(dur/w));
}

function aplicarCenario(c){
  P.cenario=c;
  var rawId=ESCOPO.obj&&ESCOPO.obj.id||"fel2";
  // Mapear id do objetivo para chave da tabela HORAS_REF
  var felKey={fel1:"fel1",fel2:"fel2",fel3:"fel3",imp:"imp",implantacao:"imp"}[rawId]||"fel2";
  var mult={otimista:0.75,realista:1.0,pessimista:1.4}[c]||1.0;
  // Prefixos de disciplinas técnicas vs gestão
  var GEST_PREFIX=["GES","PLA","INV","AQU"];
  var CATS_TEC_LIST=["RT5","RT4","RT3","RT2","RT1"];
  var CATS_GEST_LIST=["GP3","GP2","GP1|Plan"];
  for(var cod in ESCOPO.sel){
    var refAll=HORAS_REF[cod];
    if(!refAll) continue;
    var ref=refAll[felKey];
    if(!ref||ref.h===0) continue; // entregável não aplicável neste objetivo
    var totalH=Math.round(ref.h * mult);
    if(!P.hCat[cod]) P.hCat[cod]={};
    // Zerar todas as categorias primeiro
    var allCats=CATS_TEC_LIST.concat(CATS_GEST_LIST);
    for(var zc=0;zc<allCats.length;zc++) P.hCat[cod][allCats[zc]]=0;
    // Determinar se é entregável de gestão pelo prefixo
    var prefix=cod.substring(0,3);
    var isGest=GEST_PREFIX.indexOf(prefix)>=0;
    var activeCats=isGest?CATS_GEST_LIST:CATS_TEC_LIST;
    // Pegar apenas as distribuições das categorias ativas
    var dist=ref.d;
    var totalPct=0;
    for(var ai=0;ai<activeCats.length;ai++) totalPct+=(dist[activeCats[ai]]||0);
    if(totalPct===0){
      // Distribuir igualmente se não há percentuais definidos
      var eq=Math.round(totalH/activeCats.length);
      for(var ai2=0;ai2<activeCats.length;ai2++) P.hCat[cod][activeCats[ai2]]=eq;
      P.hCat[cod][activeCats[activeCats.length-1]]=Math.max(0,totalH-eq*(activeCats.length-1));
    } else {
      var allocated=0;
      for(var ai3=0;ai3<activeCats.length-1;ai3++){
        var cat=activeCats[ai3];
        var pct=(dist[cat]||0)/totalPct;
        P.hCat[cod][cat]=Math.round(totalH*pct);
        allocated+=P.hCat[cod][cat];
      }
      // Última categoria absorve arredondamento
      P.hCat[cod][activeCats[activeCats.length-1]]=Math.max(0,totalH-allocated);
    }
  }
  render();
}

function goT(t){P.tela=t;render();}
function setFornPacote(el){if(!P.fornPacote)P.fornPacote={};P.fornPacote[el.dataset.pid]=+el.value;render();}
