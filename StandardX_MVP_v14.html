<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StandardX — MVP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090F;--bg2:#0F1520;--bg3:#141E2E;
  --bord:#1B2840;--bord2:#243352;
  --az:#3B7BF6;--az2:#5B97FF;
  --vd:#0FB981;--vd2:#16D98A;--vd-bg:#031a0e;--vd-bord:#084D26;
  --am:#F5A623;--am2:#FFBA45;--am-bg:#1a0f00;--am-bord:#4A2D00;
  --vm:#EF4444;--vm2:#FF6B6B;--vm-bg:#180404;--vm-bord:#5C1414;
  --tx:#EEF2FF;--tx2:#94A3B8;--tx3:#475569;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px}
body{min-height:100vh;display:flex;justify-content:center}
.shell{width:100%;max-width:1200px;padding:24px 20px;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding-bottom:18px;border-bottom:1px solid var(--bord);margin-bottom:24px}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo em{color:var(--az);font-style:normal}
.tag{font-size:11px;color:var(--tx3);background:var(--bg2);border:1px solid var(--bord);border-radius:20px;padding:3px 10px}
.steps{display:flex;gap:6px;margin-left:auto;align-items:center}
.stp{width:8px;height:8px;border-radius:50%;background:var(--bord2);transition:all .3s}
.stp.cur{background:var(--az);width:24px;border-radius:4px}
.stp.done{background:var(--vd);cursor:pointer}
.scr{flex:1}
.titulo{font-family:'Syne',sans-serif;font-size:23px;font-weight:700;margin-bottom:5px;letter-spacing:-.3px}
.sub{color:var(--tx2);font-size:13px;margin-bottom:22px;line-height:1.6}
.fnav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:16px;border-top:1px solid var(--bord)}
.btn{background:var(--az);color:#fff;border:none;border-radius:8px;padding:11px 24px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s}
.btn:hover{background:var(--az2);transform:translateY(-1px)}
.btn:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;transform:none}
.btn-g{background:var(--vd)}.btn-g:hover{background:var(--vd2)}
.btn-s{background:transparent;color:var(--tx2);border:1px solid var(--bord);border-radius:8px;padding:10px 20px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s}
.btn-s:hover{border-color:var(--az);color:var(--az)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.obj{background:var(--bg2);border:1.5px solid var(--bord);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.obj:hover{border-color:var(--bord2);transform:translateY(-2px)}
.obj.sel{border-color:var(--az);background:#0A1528}
.card{background:var(--bg2);border:1px solid var(--bord);border-radius:var(--r);padding:18px;margin-bottom:14px}
.sec-l{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);margin-bottom:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.chip{background:var(--bg3);border:1px solid var(--bord);border-radius:20px;padding:6px 16px;font-size:12px;color:var(--tx2);cursor:pointer;transition:all .18s}
.chip:hover{border-color:var(--az);color:var(--az2)}
.chip.on{background:#0A1528;border-color:var(--az);color:var(--az2)}
.chip.on-g{background:var(--vd-bg);border-color:var(--vd-bord);color:var(--vd2)}
.warn{background:var(--am-bg);border:1px solid var(--am-bord);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--am);margin-top:8px}
.tog{width:40px;height:22px;border-radius:11px;background:var(--bord2);position:relative;transition:all .2s;cursor:pointer;flex-shrink:0}
.tog::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:all .2s}
.tog.on{background:var(--vd)}.tog.on::after{left:21px}
.calc-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border:1px solid var(--bord);border-radius:8px;padding:12px 16px}
.calc-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.rcard{background:var(--bg3);border:1px solid var(--bord);border-radius:8px;padding:14px;margin-bottom:8px}
.rcard.on{border-color:var(--bord2);background:var(--bg2)}
.rcard-top{display:flex;align-items:center;gap:10px}
.rcard-cfg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bord)}
.sel-i{background:var(--bg);border:1px solid var(--bord);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:12px;font-family:'DM Sans',sans-serif;width:100%}
.atas-tag{background:#0A1528;border:1px solid var(--bord2);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--az2);text-align:center}
/* Tabela de entregáveis */
.tbl-wrap{border:1px solid var(--bord);border-radius:var(--r);overflow:auto;max-height:500px}
.tbl-wrap::-webkit-scrollbar{width:5px;height:5px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px}
table{border-collapse:collapse;width:100%;table-layout:fixed}
table th{position:sticky;top:0;z-index:2;background:var(--bg);padding:10px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);border-bottom:2px solid var(--bord2);white-space:nowrap}
.th-cod{text-align:left;width:90px}
.th-nome{text-align:left;width:200px}
.th-nv{text-align:center;min-width:170px}
.tr-disc td{background:var(--bg3);padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);border-top:2px solid var(--bord2)}
.tr-e{border-bottom:1px solid var(--bord)}
.tr-e:hover td{filter:brightness(1.08)}
.td-cod{padding:10px 10px;font-size:10px;color:var(--tx3);font-weight:600;vertical-align:top;white-space:nowrap}
.td-nome{padding:10px 10px;font-size:12px;color:var(--tx2);vertical-align:top;line-height:1.4;cursor:pointer}
.td-nome:hover{color:var(--az2)}
.td-nv{padding:8px 10px;vertical-align:top;cursor:pointer;min-width:170px;transition:filter .15s}
.td-nv:hover{filter:brightness(1.2)}
/* Sumário */
.sumario{background:var(--bg2);border-top:1px solid var(--bord2);padding:10px 16px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;border-radius:0 0 var(--r) var(--r)}
.sum-item{text-align:center}
.sum-n{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;line-height:1}
.sum-l{font-size:10px;color:var(--tx3);margin-top:2px}
/* Legenda */
.leg{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--tx2)}
.leg-d{width:14px;height:14px;border-radius:3px;flex-shrink:0}
/* Busca e filtros */
.search{background:var(--bg2);border:1px solid var(--bord);border-radius:8px;padding:9px 14px;color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;width:100%;margin-bottom:10px;outline:none}
.search:focus{border-color:var(--az)}.search::placeholder{color:var(--tx3)}
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filtro{background:var(--bg2);border:1px solid var(--bord);border-radius:20px;padding:4px 14px;font-size:11px;color:var(--tx3);cursor:pointer;transition:all .18s;white-space:nowrap}
.filtro:hover,.filtro.on{background:#0A1528;border-color:var(--az);color:var(--az2)}
/* Revisão */
.res-r{display:flex;justify-content:space-between;align-items:center;padding:8px 16px}
.pbar{height:4px;background:var(--bord);border-radius:2px;overflow:hidden;width:80px}
.pbar-f{height:100%;border-radius:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
/* Drawer */
.drw-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;justify-content:flex-end}
.drw{background:var(--bg2);border-left:1px solid var(--bord);width:380px;max-width:100vw;height:100%;overflow-y:auto;padding:24px}
.drw::-webkit-scrollbar{width:4px}
.drw::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:2px}
.drw-close{width:30px;height:30px;background:var(--bg3);border:1px solid var(--bord);border-radius:6px;color:var(--tx2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-family:'DM Sans',sans-serif}
.inf-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--bord)}
.inf-item:last-child{border-bottom:none}
.inf-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
/* Cards finais */
.fim-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:520px;margin:0 auto 28px}
.fim-card{background:var(--bg2);border:1px solid var(--bord);border-radius:10px;padding:16px}
input[type=number]{background:var(--bg);border:1px solid var(--bord);border-radius:6px;padding:5px 10px;color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;width:68px;text-align:center}
input[type=number]:focus{outline:none;border-color:var(--az)}
.fade{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg2);border:1px solid var(--bord);border-radius:16px;padding:40px 36px;max-width:360px;width:100%;text-align:center}
.login-logo{font-family:Syne,sans-serif;font-size:26px;font-weight:800;color:var(--px2);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--tx3);margin-bottom:28px}
.login-inp{width:100%;background:var(--bg3);border:1px solid var(--bord);border-radius:8px;padding:12px;color:var(--tx);font-size:15px;text-align:center;letter-spacing:3px;outline:none;margin-bottom:12px}
.login-btn{width:100%;background:var(--px);color:#07090F;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px}
.login-err{font-size:12px;color:#F87171;min-height:18px;margin-top:4px}
.watermark{position:fixed;bottom:10px;right:14px;font-size:10px;color:rgba(255,255,255,.1);pointer-events:none;z-index:998;font-family:Syne,sans-serif;user-select:none}
</style>
</head>

    for(var ni=0;ni<sugIdx;ni++){ // apenas níveis anteriores ao objetivo
      var st=getSt(e.c,NVS[ni]);
      if(st==="PRED"){
        var ct=(CONT[e.c]&&CONT[e.c][NVS[ni]])||"";
        if(ct&&ct!=="—") predConts.push({nv:NVS[ni],ct:ct});
      }
    }
    if(predConts.length){
      list.push({e:e,conts:predConts});
    }
  }
  return list;
}
// Verifica se o entregavel está selecionado
function ESCOPO_SEL(cod){ return !!S.sel[cod]; }
function getSt(cod,nv){
  if(!S.obj||!nv)return"NA";
  var r=ST[cod];
  return(r&&r[S.obj.id]&&r[S.obj.id][nv])||"NA";
}
function initSel(){
  S.sel={};
  if(!S.obj)return;
  var sugNv=NV_OBJ[S.obj.id];
  for(var i=0;i<E.length;i++){
    var st=getSt(E[i].c,sugNv);
    if(st==="O") S.sel[E[i].c]=sugNv; // apenas obrigatórios — Op fica a critério do owner
  }
}
function calcA(f){
  var w=FW[f]||0;
  if(!w)return(f==="Por evento")?1:0;
  var durSem=(S.dur&&S.dur>0)?S.dur:(S.obj?DUR[S.obj.id]:16);
  return Math.max(1,Math.round(durSem/w));
}
function reunInc(){
  var r=[];
  for(var i=0;i<REUN.length;i++){if(S.reun[REUN[i].id].inc) r.push(REUN[i]);}
  return r;
}
function totAtas(){
  var t=0;
  for(var i=0;i<REUN.length;i++){
    var c=S.reun[REUN[i].id];
    if(!c.inc)continue;
    var a=calcA(c.f);
    t+=(typeof a==="number")?a:(a==="1"?1:0);
  }
  return t;
}

function T2(){

  for(var fi=0;fi<filtList.length;fi++){
    var fd=filtList[fi];
    filtHtml+="<div class='filtro"+(S.filt===fd?" on":"")+"' onclick='S.filt=\""+fd+"\";render()'>"+(fd==="Todas"?"Todas as disciplinas":fd)+"</div>";

  // Linhas da tabela
  var tbody="";
  var discList=[];
  for(var di=0;di<DISCS.length;di++){
    if(S.filt==="Todas"||DISCS[di]===S.filt) discList.push(DISCS[di]);
  }
  for(var di2=0;di2<discList.length;di2++){
    var disc=discList[di2];
    var items=[];
    for(var ei=0;ei<E.length;ei++){
      var e=E[ei];
      if(e.d!==disc) continue;
      if(busca&&e.n.toLowerCase().indexOf(busca)<0&&e.c.toLowerCase().indexOf(busca)<0) continue;
      items.push(e);
    }
    if(!items.length) continue;
    tbody+="<tr class='tr-disc'><td colspan='6'>"+disc+"</td></tr>";
    for(var ii=0;ii<items.length;ii++){
      var e2=items[ii];
      var selNv=S.sel[e2.c]||null;
      var cells="";
      for(var ni=0;ni<NVS.length;ni++){
        var nv=NVS[ni];
        var stNv=getSt(e2.c,nv);
        var isSel=(selNv===nv);

        // Conteúdo acumulado — sem labels de nível nos níveis B,C,D
        var accLines=[];
        for(var ai=0;ai<=ni;ai++){
          var ct=(CONT[e2.c]&&CONT[e2.c][NVS[ai]])||"";
          if(ct&&ct!=="—") accLines.push({nv:NVS[ai],txt:ct,isNew:(ai===ni)});
        }
        var ctHtml="";
        for(var li=0;li<accLines.length;li++){
          var ln=accLines[li];
          var isLast=(li===accLines.length-1);
          ctHtml+="<div style='margin-bottom:"+(isLast?"0":"5px")+";padding-bottom:"+(isLast?"0":"5px")+";border-bottom:"+(isLast?"none":"1px solid rgba(255,255,255,.06)")+"'>";
          // Nível A: mostra label. Níveis B,C,D: só texto, sem label
          if(ni===0){
            ctHtml+="<span style='font-size:11px'>"+ln.txt+"</span>";
          } else {
            // sem label de nível
            ctHtml+="<span style='font-size:11px;opacity:1'>"+ln.txt+"</span>";
          }
          ctHtml+="</div>";
        }
        if(!ctHtml) ctHtml="<span style='opacity:.2;font-style:italic'>—</span>";

        // Visual: selecionado = verde vibrante + SELECIONADO
        // Não selecionado = cor metodológica mas opaca
        var bg,opacity,borderL,ctColor,selLabel="";
        // Cor base pelo status metodológico
        if(stNv==="O")         {bg="var(--vd-bg)";ctColor="var(--vd2)";borderL="3px solid var(--vd2)";}
        else if(stNv==="Op")   {bg="var(--am-bg)";ctColor="var(--am2)";borderL="3px solid var(--am2)";}
        else if(stNv==="NA")   {bg="var(--vm-bg)";ctColor="var(--vm2)";borderL="3px solid var(--vm2)";}
        else if(stNv==="PRED") {bg="#070f1e";ctColor="var(--az2)";borderL="3px solid var(--az2)";}
        else                   {bg="var(--bg3)";ctColor="var(--tx3)";borderL="1px solid var(--bord)";}
        if(isSel){
          // Selecionado: sempre verde independente de O ou Op
          bg="var(--vd-bg)";
          ctColor="var(--vd2)";
          borderL="3px solid var(--vd2)";
          opacity="1";
          selLabel="<div style='font-size:9px;font-weight:700;color:var(--vd2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px'>✓ SELECIONADO</div>";
        } else if(stNv==="Op"){
          // Recomendado não selecionado — amarelo com label RECOMENDADO
          opacity="0.75";
          selLabel="<div style='font-size:9px;font-weight:700;color:var(--am2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px'>★ RECOMENDADO</div>";
        } else {
          opacity="0.35";
          borderL="1px solid transparent";
        }

        cells+="<td class='td-nv' style='background:"+bg+";border-left:"+borderL+";opacity:"+opacity+"' onclick='toggleNv(\""+e2.c+"\",\""+nv+"\")'>";
        cells+=selLabel;
        cells+="<div style='font-size:11px;color:"+ctColor+";line-height:1.5'>"+ctHtml+"</div></td>";
      }
      tbody+="<tr class='tr-e'>";
      tbody+="<td class='td-cod'>"+e2.c+"</td>";
      tbody+="<td class='td-nome' onclick='openDrw(\""+e2.c+"\")'>"+e2.n+"<br><span style='font-size:10px;opacity:.35'>ⓘ informações</span></td>";
      tbody+=cells+"</tr>";
    }
  }

  // Sumário por nível
  var nvSum="";
  var nvColors={A:"#5b97ff",B:"#fbbf24",C:"#4ade80",D:"#c084fc"};
  for(var ni2=0;ni2<NVS.length;ni2++){
    var nvx=NVS[ni2];
    var cnt=0;
    for(var cod in S.sel){if(S.sel[cod]===nvx) cnt++;}
    if(cnt>0) nvSum+="<div class='sum-item'><div class='sum-n' style='color:"+nvColors[nvx]+"'>"+cnt+"</div><div class='sum-l'>Nível "+nvx+"</div></div>";
  }

  var h="<div class='titulo'>Definição de entregáveis e níveis</div>";
  h+="<div class='sub'>Clique em uma célula para selecionar o nível desejado. Células selecionadas ficam em verde. Clique no nome do entregável para ver detalhes e informações de entrada.</div>";
  h+="<div style='display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;align-items:center'>";
  h+="<div style='font-family:\"Syne\",sans-serif;font-size:18px;font-weight:700;color:var(--vd2)'>"+incCount+" entregáveis selecionados</div>";
  h+="<div style='font-size:12px;color:var(--tx3)'>Objetivo: <strong style='color:var(--tx2)'>"+S.obj.l+"</strong></div>";
  h+="<div style='margin-left:auto'><button class='btn-s' style='font-size:11px;padding:5px 14px' onclick='initSel();render()'>↺ Restaurar sugestão</button></div></div>";
  h+="<input class='search' placeholder='Buscar entregável ou código...' value='"+S.busca+"' oninput='S.busca=this.value;render()'/>";
  h+="<div class='filtros'>"+filtHtml+"</div>";
  h+="<div class='tbl-wrap'><table>";
  h+="<colgroup><col style='width:90px'/><col style='width:190px'/><col/><col/><col/><col/></colgroup>";
  h+="<thead>";
  h+="<tr><th colspan='2' style='border-bottom:none'></th>";
  h+="<th colspan='4' style='text-align:center;font-size:11px;font-weight:700;color:var(--az2);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--bord2)'>Nível de desenvolvimento dos entregáveis</th></tr>";
  h+="<tr>";
  h+="<th class='th-cod'>Código</th><th class='th-nome'>Entregável</th>";
  h+="<th class='th-nv'>A</th><th class='th-nv'>B</th><th class='th-nv'>C</th><th class='th-nv'>D</th>";
  h+="</tr></thead><tbody>"+tbody+"</tbody></table>";
  h+="<div class='sumario'>";
  h+="<div class='sum-item'><div class='sum-n' style='color:var(--vd2)'>"+incCount+"</div><div class='sum-l'>Selecionados</div></div>";
  h+=nvSum;
  h+="<div style='margin-left:auto'><button class='btn' onclick='goT(3)'>Revisar e aprovar →</button></div>";
  h+="</div></div>";
  h+="<div class='fnav'><button class='btn-s' onclick='goT(1)'>← Voltar</button></div>";
  return h;
}

function TPRED(){
  var predList=getPredList();
  var h="<div class='titulo'>Informações predecessoras</div>";
  h+="<div class='sub'>Indique quais informações de fases anteriores já estão disponíveis para a proponente.</div>";
  if(!predList.length){
    h+="<div style='text-align:center;padding:40px;background:var(--bg2);border:1px solid var(--bord);border-radius:10px;color:var(--tx3)'>Nenhuma informação predecessora identificada para os entregáveis selecionados neste objetivo.</div>";
  } else {
    var totP=0,dispP=0;
    for(var p0=0;p0<predList.length;p0++)
      for(var c0=0;c0<predList[p0].conts.length;c0++){
        totP++;
        if(S.predDisp[predList[p0].e.c+"_"+predList[p0].conts[c0].nv]) dispP++;
      }
    // Barra de progresso
    h+="<div style='display:flex;gap:16px;margin-bottom:12px;align-items:center'>";
    h+="<div style='flex:1;height:5px;background:var(--bord);border-radius:3px;overflow:hidden'>";
    h+="<div style='height:100%;width:"+Math.round(dispP/totP*100)+"%;background:"+(dispP===totP?"var(--vd)":"var(--am)")+";border-radius:3px;transition:width .3s'></div></div>";
    h+="<span style='font-size:13px;font-weight:700;color:"+(dispP===totP?"var(--vd2)":"var(--am2)")+"'>"+dispP+"/"+totP+" disponíveis</span>";
    h+="</div>";
    // Botões globais
    h+="<div style='display:flex;gap:10px;margin-bottom:14px'>";
    h+="<button onclick='setPredAll(true)' style='padding:7px 16px;border-radius:8px;border:1px solid var(--vd-bord);background:var(--vd-bg);color:var(--vd2);font-size:12px;font-weight:700;cursor:pointer'>✓ Marcar todos disponível</button>";
    h+="<button onclick='setPredAll(false)' style='padding:7px 16px;border-radius:8px;border:1px solid var(--vm-bord);background:var(--vm-bg);color:var(--vm2);font-size:12px;font-weight:700;cursor:pointer'>✗ Marcar todos pendente</button>";
    h+="</div>";
    // Tabela estilo entregáveis
    var byD={};
    for(var p1=0;p1<predList.length;p1++){
      var d=predList[p1].e.d;
      if(!byD[d]) byD[d]=[];
      byD[d].push(predList[p1]);
    }
    var tbody="";
    for(var disc in byD){
      tbody+="<tr class='tr-disc'><td colspan='4'>"+disc+"</td></tr>";
      for(var p2=0;p2<byD[disc].length;p2++){
        var item=byD[disc][p2];
        // Status do item
        var allDisp=true,anySet=false;
        for(var cx=0;cx<item.conts.length;cx++){
          var kx=item.e.c+"_"+item.conts[cx].nv;
          if(!S.predDisp[kx]) allDisp=false;
          if(S.predDisp[kx]!==undefined) anySet=true;
        }
        var rowBg=allDisp&&anySet?"var(--vd-bg)":anySet?"var(--vm-bg)":"var(--bg2)";
        var rowBord=allDisp&&anySet?"var(--vd2)":anySet?"var(--vm2)":"var(--bord2)";
        var statusBadge=allDisp&&anySet
          ?"<span class='badge' style='background:var(--vd-bg);color:var(--vd2);border:1px solid var(--vd-bord)'>✓ Disponível</span>"
          :anySet
          ?"<span class='badge' style='background:var(--vm-bg);color:var(--vm2);border:1px solid var(--vm-bord)'>✗ Pendente</span>"
          :"<span class='badge' style='background:var(--bg3);color:var(--tx3);border:1px solid var(--bord)'>— Não informado</span>";
        // Conteúdo: juntar múltiplos com separador
        var ctHtml="";
        for(var c2=0;c2<item.conts.length;c2++){
          if(c2>0) ctHtml+="<div style='height:4px'></div>";
          ctHtml+="<div style='font-size:12px;color:var(--tx2);line-height:1.5'>"+item.conts[c2].ct+"</div>";
        }
        tbody+="<tr style='border-bottom:1px solid var(--bord)'>";
        tbody+="<td style='padding:10px;font-size:10px;color:var(--tx3);font-weight:600;vertical-align:top;width:86px;border-left:3px solid "+rowBord+";background:"+rowBg+"'>"+item.e.c+"</td>";
        tbody+="<td style='padding:10px;font-size:12px;color:var(--tx2);font-weight:500;vertical-align:top;width:180px;background:"+rowBg+"'>"+item.e.n+"</td>";
        tbody+="<td style='padding:10px;vertical-align:top;background:"+rowBg+"'>"+ctHtml+"</td>";
        tbody+="<td style='padding:10px;vertical-align:middle;text-align:center;width:150px;background:"+rowBg+"'>";
        tbody+="<div style='display:flex;flex-direction:column;gap:6px;align-items:center'>";
        tbody+=statusBadge;
        tbody+="<div style='display:flex;gap:5px'>";
        tbody+="<button data-cod='"+item.e.c+"' onclick='setPredByCod(this.dataset.cod,true)' style='padding:4px 10px;border-radius:5px;border:1px solid var(--vd-bord);background:"+(allDisp&&anySet?"var(--vd)":"var(--bg3)")+";color:"+(allDisp&&anySet?"#fff":"var(--vd2)")+";font-size:11px;font-weight:700;cursor:pointer'>✓</button>";
        tbody+="<button data-cod='"+item.e.c+"' onclick='setPredByCod(this.dataset.cod,false)' style='padding:4px 10px;border-radius:5px;border:1px solid var(--vm-bord);background:"+(anySet&&!allDisp?"var(--vm)":"var(--bg3)")+";color:"+(anySet&&!allDisp?"#fff":"var(--vm2)")+";font-size:11px;font-weight:700;cursor:pointer'>✗</button>";
        tbody+="</div></div></td></tr>";
      }
    }
    h+="<div class='tbl-wrap'><table>";
    h+="<colgroup><col style='width:86px'/><col style='width:180px'/><col/><col style='width:150px'/></colgroup>";
    h+="<thead><tr>";
    h+="<th class='th-cod'>Código</th><th class='th-nome'>Entregável predecessor</th>";
    h+="<th style='text-align:left;padding:10px;font-size:11px;color:var(--tx2)'>Conteúdo necessário</th>";
    h+="<th style='text-align:center;padding:10px;font-size:11px;color:var(--tx2)'>Disponibilidade</th>";
    h+="</tr></thead><tbody>"+tbody+"</tbody></table></div>";
  }
  h+="<div class='fnav'>";
  h+="<button class='btn-s' onclick='goT(2)'>← Voltar</button>";
  h+="<button class='btn' onclick='goT(4)'>Revisar e aprovar →</button>";
  h+="</div>";
  return h;
}

function render(){
  var _tblScroll=0;
  var _tblEl=document.querySelector('.tbl-wrap');
  if(_tblEl) _tblScroll=_tblEl.scrollTop;
  var stepsHtml="";
  for(var i=0;i<6;i++){
    var cls=i<S.tela?"done":i===S.tela?"cur":"";
    var clk=i<S.tela?"onclick='goT("+i+")'":"";
    stepsHtml+="<div class='stp"+(" "+cls).trim()+"' "+clk+" title='Etapa "+(i+1)+"'></div>";
  }
  document.getElementById("steps").innerHTML=stepsHtml;
  var sc=document.getElementById("scr");
  sc.className="scr fade";
  sc.innerHTML=Ts[S.tela]();
  void sc.offsetWidth;
  if(_tblScroll>0){
    var _tblEl2=document.querySelector('.tbl-wrap');
    if(_tblEl2) _tblEl2.scrollTop=_tblScroll;
  }
}

var _auth=(function(){try{return sessionStorage.getItem("stdx_auth")==="ok";}catch(e){return false;}}
)();
function verificarSenha(){
  var inp=document.getElementById("_lInp");
  if(!inp)return;
  if(inp.value==="standardx2025"){
    try{sessionStorage.setItem("stdx_auth","ok");}catch(e){}
    var ov=document.getElementById("_lOv");
    if(ov) document.body.removeChild(ov);
    render();
  }else{
    var err=document.getElementById("_lErr");
    if(err) err.textContent="Senha incorreta.";
    inp.value=""; inp.focus();
  }
}
function mostrarLogin(){
  var ov=document.createElement("div");
  ov.id="_lOv"; ov.className="login-overlay";
  ov.innerHTML="<div class='login-box'>"
    +"<div class='login-logo'>StandardX</div>"
    +"<div class='login-sub'>MVP · Acesso restrito</div>"
    +"<input id='_lInp' class='login-inp' type='password' placeholder='Senha de acesso' "
    +"onkeydown=\"if(event.key==='Enter')verificarSenha()\"/>"
    +"<button class='login-btn' onclick='verificarSenha()'>Entrar →</button>"
    +"<div id='_lErr' class='login-err'></div></div>";
  document.body.appendChild(ov);
  setTimeout(function(){var el=document.getElementById("_lInp");if(el)el.focus();},100);
}

if(!_auth){mostrarLogin();}else{render();}
